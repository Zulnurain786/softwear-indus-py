name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key <<EOF
          ${{ secrets.VM_SSH_KEY }}
          EOF
          sed -i 's/\r$//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy docker-compose.yml to VM
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/app/docker-compose.yml

      - name: Deploy flask-app-1
        env:
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "export DOCKER_USER='${DOCKER_USER}' \
             IMAGE_TAG='${IMAGE_TAG}' \
             DOCKER_PASSWORD='${DOCKER_PASSWORD}'; bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p ~/app
          cd ~/app

          export DOCKER_USERNAME="$DOCKER_USER"
          export APP1_IMAGE_TAG="$IMAGE_TAG"

          echo "$DOCKER_PASSWORD" | sudo docker login \
            -u "$DOCKER_USER" --password-stdin

          sudo -E docker compose pull flask-app-1
          sudo -E docker compose up -d flask-app-1

          sudo docker compose ps
          EOF