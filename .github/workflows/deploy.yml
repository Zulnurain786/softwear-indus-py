name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and tag image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          chmod 700 ~/.ssh
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}

      - name: Debug SSH key
        run: |
          echo "=== Key first line ==="
          head -1 ~/.ssh/deploy_key
          echo "=== Key last line ==="
          tail -1 ~/.ssh/deploy_key
          echo "=== Line count ==="
          wc -l ~/.ssh/deploy_key
          echo "=== File permissions ==="
          ls -la ~/.ssh/deploy_key
          echo "=== Key type & fingerprint ==="
          ssh-keygen -l -f ~/.ssh/deploy_key
          echo "=== Any Windows line endings (should be empty) ==="
          cat -A ~/.ssh/deploy_key | grep '\^M' || echo "No Windows line endings found"

      - name: Create remote app directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "mkdir -p ~/app"

      - name: Copy docker-compose.yml to VM
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/app/docker-compose.yml

      - name: Deploy to VM via SSH
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            DOCKER_USERNAME="$DOCKER_USER" \
            DOCKER_PASSWORD="$DOCKER_PASS" \
            IMAGE_TAG="$IMAGE_TAG" \
            bash -s << 'ENDSSH'
              set -euo pipefail
              mkdir -p ~/app
              cd ~/app
              echo "$DOCKER_PASSWORD" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin
              sudo -E docker compose pull
              sudo -E docker compose up -d
              sudo docker compose ps
          ENDSSH